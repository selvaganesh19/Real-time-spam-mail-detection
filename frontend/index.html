<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="57x57" href="./icon/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="./icon/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="./icon/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="./icon/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="./icon/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="./icon/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="./icon/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="./icon/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./icon/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="./icon/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./icon/favicon-16x16.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="msapplication-TileColor" content="#667eea">
    <meta name="msapplication-TileImage" content="./icon/ms-icon-144x144.png">
    <meta name="theme-color" content="#667eea">
    <title>Email Spam Detection</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 35%, #f093fb 70%, #ff6b9d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15), transparent);
            border-radius: 50%;
            top: -100px;
            left: -150px;
            animation: float 8s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1), transparent);
            border-radius: 50%;
            bottom: -80px;
            right: -100px;
            animation: float 10s ease-in-out infinite reverse;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-40px) translateX(30px); }
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            padding: 60px 50px;
            border-radius: 25px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25), 0 0 40px rgba(102, 126, 234, 0.2);
            text-align: center;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 1;
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            25% { transform: translateY(-15px) scale(1.05); }
            50% { transform: translateY(0) scale(1); }
        }

        .logo-text {
            font-weight: 700;
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 0.8px;
            animation: fadeInDown 0.8s ease-out 0.1s both;
        }

        h1 {
            margin-bottom: 15px;
            color: #333;
            font-size: 36px;
            font-weight: 700;
            animation: fadeInDown 0.8s ease-out 0.2s both;
        }

        p {
            color: #666;
            margin-bottom: 45px;
            font-size: 16px;
            line-height: 1.8;
            animation: fadeInDown 0.8s ease-out 0.3s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button-wrapper {
            animation: fadeInUp 0.8s ease-out 0.4s both;
            position: relative;
        }

        button {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.45);
            letter-spacing: 0.5px;
        }

        /* Shimmer effect on button */
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s ease;
            z-index: 1;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 18px 45px rgba(102, 126, 234, 0.65), 0 0 30px rgba(240, 147, 251, 0.3);
        }

        button:active {
            transform: translateY(-1px) scale(0.98);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.45);
        }

        .icon {
            font-size: 20px;
            display: inline-block;
            animation: rotate 2s linear infinite;
            position: relative;
            z-index: 2;
        }

        button:hover .icon {
            animation: rotate 1s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Pulse effect on container */
        @keyframes pulse-glow {
            0% { box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25), 0 0 40px rgba(102, 126, 234, 0.2); }
            50% { box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25), 0 0 60px rgba(102, 126, 234, 0.4); }
            100% { box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25), 0 0 40px rgba(102, 126, 234, 0.2); }
        }

        .container:hover {
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), pulse-glow 2s ease-in-out infinite;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive design */
        @media (max-width: 480px) {
            .container {
                padding: 45px 30px;
                width: 95%;
                max-width: none;
            }

            h1 {
                font-size: 28px;
            }

            .logo {
                font-size: 52px;
            }

            .logo-text {
                font-size: 24px;
            }

            p {
                font-size: 15px;
                margin-bottom: 35px;
            }

            button {
                padding: 14px 20px;
                font-size: 16px;
            }
        }

    </style>

</head>

<body>

    <div class="container">
        <div class="logo">📧</div>
        <div class="logo-text">Spam Detector</div>

        <h1>Welcome</h1>

        <p>Connect your Gmail to start detecting spam emails using AI.</p>

        <div class="button-wrapper">
            <button onclick="connectGmail()">
                <span class="icon">🔗</span>
                Connect Gmail
            </button>
        </div>
    </div>

    <script>
        function connectGmail() {
            window.location.href = "http://127.0.0.1:8000/connect-gmail";
        }
    </script>

</body>

</html>
