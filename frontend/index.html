    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 35%, #f093fb 70%, #ff6b9d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15), transparent);
            border-radius: 50%;
            top: -100px;
            left: -150px;
            animation: float 8s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1), transparent);
            border-radius: 50%;
            bottom: -80px;
            right: -100px;
            animation: float 10s ease-in-out infinite reverse;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-40px) translateX(30px); }
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            padding: 60px 50px;
            border-radius: 25px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25), 0 0 40px rgba(102, 126, 234, 0.2);
            text-align: center;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 1;
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            25% { transform: translateY(-15px) scale(1.05); }
            50% { transform: translateY(0) scale(1); }
        }

        .logo-text {
            font-weight: 700;
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 0.8px;
            animation: fadeInDown 0.8s ease-out 0.1s both;
        }

        h1 {
            margin-bottom: 15px;
            color: #333;
            font-size: 36px;
            font-weight: 700;
            animation: fadeInDown 0.8s ease-out 0.2s both;
        }

        p {
            color: #666;
            margin-bottom: 45px;
            font-size: 16px;
            line-height: 1.8;
            animation: fadeInDown 0.8s ease-out 0.3s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button-wrapper {
            animation: fadeInUp 0.8s ease-out 0.4s both;
            position: relative;
        }

        button {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.45);
            letter-spacing: 0.5px;
        }

        /* Shimmer effect on button */
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s ease;
            z-index: 1;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 18px 45px rgba(102, 126, 234, 0.65), 0 0 30px rgba(240, 147, 251, 0.3);
        }

        button:active {
            transform: translateY(-1px) scale(0.98);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.45);
        }

        .icon {
            font-size: 20px;
            display: inline-block;
            animation: rotate 2s linear infinite;
            position: relative;
            z-index: 2;
        }

        button:hover .icon {
            animation: rotate 1s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Pulse effect on container */
        @keyframes pulse-glow {
            0% { box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25), 0 0 40px rgba(102, 126, 234, 0.2); }
            50% { box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25), 0 0 60px rgba(102, 126, 234, 0.4); }
            100% { box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25), 0 0 40px rgba(102, 126, 234, 0.2); }
        }

        .container:hover {
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), pulse-glow 2s ease-in-out infinite;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Footer Styling */
        footer {
            margin-top: 60px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .footer-content {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px 35px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.95);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            padding-bottom: 5px;
        }

        .footer-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #f093fb, #ff6b9d);
            transition: width 0.3s ease;
        }

        .footer-links a:hover::after {
            width: 100%;
        }

        .footer-links a:hover {
            color: #fff;
            transform: translateY(-2px);
        }

        .footer-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
            margin: 15px 0;
        }

        .footer-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
            line-height: 1.6;
        }

        .footer-social {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .social-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
        }

        .social-icon:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        /* Responsive design */
        @media (max-width: 480px) {
            .container {
                padding: 45px 30px;
                width: 95%;
                max-width: none;
            }

            h1 {
                font-size: 28px;
            }

            .logo {
                font-size: 52px;
            }

            .logo-text {
                font-size: 24px;
            }

            p {
                font-size: 15px;
                margin-bottom: 35px;
            }

            button {
                padding: 14px 20px;
                font-size: 16px;
            }

            footer {
                margin-top: 40px;
            }

            .footer-content {
                padding: 20px 25px;
            }

            .footer-links {
                gap: 15px;
            }

            .footer-links a {
                font-size: 13px;
            }

            .footer-text {
                font-size: 12px;
            }
        }

    </style>

</head>
