<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="57x57" href="./icon/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="./icon/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="./icon/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="./icon/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="./icon/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="./icon/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="./icon/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="./icon/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./icon/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="./icon/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./icon/favicon-16x16.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="msapplication-TileColor" content="#667eea">
    <meta name="msapplication-TileImage" content="/icon/ms-icon-144x144.png">
    <meta name="theme-color" content="#667eea">
    <title>Email Spam Detection Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 35%, #f093fb 70%, #ff6b9d 100%);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1), transparent);
            border-radius: 50%;
            top: -150px;
            left: -200px;
            animation: float 12s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08), transparent);
            border-radius: 50%;
            bottom: -100px;
            right: -150px;
            animation: float 14s ease-in-out infinite reverse;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-50px) translateX(40px); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-title {
            font-size: 48px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            letter-spacing: 1px;
        }

        .header-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
        }

        .button-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
            animation: slideUp 0.8s ease-out 0.2s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scan-btn {
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #ff6b9d 0%, #f093fb 50%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.4);
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .scan-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.8s ease;
        }

        .scan-btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 25px 60px rgba(255, 107, 157, 0.6), 0 0 30px rgba(240, 147, 251, 0.4);
        }

        .scan-btn:hover::before {
            left: 100%;
        }

        .scan-btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        .scan-icon {
            font-size: 22px;
            display: inline-block;
            animation: pulse-icon 1.5s ease-in-out infinite;
        }

        .scan-btn:hover .scan-icon {
            animation: spin-icon 0.8s linear infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes spin-icon {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .table-wrapper {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.2), 0 0 40px rgba(102, 126, 234, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideUp 0.8s ease-out 0.3s both;
            overflow-x: auto;
        }

        .table-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        th {
            padding: 16px 20px;
            text-align: left;
            color: white;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 15px;
            color: #555;
            transition: all 0.3s ease;
        }

        tbody tr {
            transition: all 0.3s ease;
            animation: fadeIn 0.6s ease-out;
        }

        tbody tr:hover {
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.1), rgba(240, 147, 251, 0.1));
            transform: scale(1.01);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.15);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .prediction-spam {
            color: #ff6b9d;
            font-weight: 700;
            padding: 6px 12px;
            background: rgba(255, 107, 157, 0.1);
            border-radius: 8px;
            display: inline-block;
        }

        .prediction-ham {
            color: #667eea;
            font-weight: 700;
            padding: 6px 12px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            display: inline-block;
        }

        .probability {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .probability-bar {
            width: 80px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .probability-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #f093fb);
            transition: width 0.6s ease;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        .empty-state-text {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-weight: 600;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideUp 0.8s ease-out both;
            transition: all 0.3s ease;
        }

        .stat-card:nth-child(1) { animation-delay: 0.3s; }
        .stat-card:nth-child(2) { animation-delay: 0.4s; }
        .stat-card:nth-child(3) { animation-delay: 0.5s; }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .stat-label {
            color: #999;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .header-title {
                font-size: 32px;
            }

            .table-wrapper {
                padding: 20px;
            }

            th, td {
                padding: 12px 10px;
                font-size: 13px;
            }

            .scan-btn {
                padding: 14px 30px;
                font-size: 16px;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 class="header-title">📧 Spam Detection Dashboard</h1>
            <p class="header-subtitle">Real-time email spam detection powered by AI</p>
        </div>

        <div class="stats-container" id="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="total-count">0</div>
                <div class="stat-label">Total Emails</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="spam-count">0</div>
                <div class="stat-label">Spam Detected</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="ham-count">0</div>
                <div class="stat-label">Legitimate</div>
            </div>
        </div>

        <div class="button-wrapper">
            <button class="scan-btn" onclick="scanEmails()">
                <span class="scan-icon">🔍</span>
                Scan Emails
            </button>
        </div>

        <div class="table-wrapper">
            <h2 class="table-title">Email Results</h2>
            <div id="loading" class="loading" style="display: none;">
                <span class="spinner"></span>
                Scanning emails...
            </div>
            <div id="empty-state" class="empty-state">
                <div class="empty-state-icon">📬</div>
                <p class="empty-state-text">Click "Scan Emails" to analyze your inbox</p>
            </div>
            <table id="table" style="display: none;">
                <thead>
                    <tr>
                        <th>Sender</th>
                        <th>Subject</th>
                        <th>Prediction</th>
                        <th>Probability</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function scanEmails() {
            const loadingDiv = document.getElementById('loading');
            const emptyState = document.getElementById('empty-state');
            const table = document.getElementById('table');
            const tableBody = document.getElementById('table-body');

            loadingDiv.style.display = 'block';
            emptyState.style.display = 'none';
            table.style.display = 'none';

            try {
                const response = await fetch("https://real-time-spam-mail-detection-backend.onrender.com/scan-mails");
                const data = await response.json();

                tableBody.innerHTML = "";

                let spamCount = 0;
                let hamCount = 0;

                data.forEach((email, index) => {
                    let row = document.createElement("tr");
                    
                    const predictionClass = email.prediction.toLowerCase() === 'spam' 
                        ? 'prediction-spam' 
                        : 'prediction-ham';
                    
                    const predictionText = email.prediction.toUpperCase();
                    
                    if (email.prediction.toLowerCase() === 'spam') {
                        spamCount++;
                    } else {
                        hamCount++;
                    }

                    const probability = parseFloat(email.probability) * 100;

                    row.innerHTML = `
                        <td>${email.sender}</td>
                        <td>${email.subject}</td>
                        <td><span class="${predictionClass}">${predictionText}</span></td>
                        <td>
                            <div class="probability">
                                <div class="probability-bar">
                                    <div class="probability-fill" style="width: ${probability}%"></div>
                                </div>
                                <span>${probability.toFixed(1)}%</span>
                            </div>
                        </td>
                    `;
                    
                    tableBody.appendChild(row);
                });

                loadingDiv.style.display = 'none';
                table.style.display = 'table';

                // Update stats
                document.getElementById('total-count').textContent = data.length;
                document.getElementById('spam-count').textContent = spamCount;
                document.getElementById('ham-count').textContent = hamCount;

            } catch (error) {
                console.error('Error scanning emails:', error);
                loadingDiv.style.display = 'none';
                emptyState.style.display = 'block';
                emptyState.querySelector('.empty-state-text').textContent = 'Error scanning emails. Please try again.';
            }
        }
    </script>
</body>

</html>
